<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মোঃ তোহা আলী</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="left">
        <img src="images/profile.jpg" alt="Profile">
        <div>
            <h1>মোঃ তোহা আলী</h1>
            <p class="bio">mdtohaali</p>
        </div>
    </div>

    <div class="date-circle" id="date-circle"></div>
</header>

<div class="divider"></div>

<!-- ✅ Calendar Section এখন এখানে -->
<section class="calendar-section" id="calendar-section">

    <div class="event-card-container" id="event-card-container"></div>

    <div class="calendar-box">
        <div class="calendar-header">
            <button id="prev-month">‹</button>
            <h3 id="month-year"></h3>
            <button id="next-month">›</button>
        </div>
        <div class="calendar-days" id="calendar-days"></div>
    </div>

</section>

<!-- Hero এখন ক্যালেন্ডারের পরে -->
<section class="hero">
    <h2>I design <span>minimal</span> and premium digital experiences.</h2>
    <p>
        Focused on clarity, performance and timeless design.
        Building modern websites with refined aesthetics.
    </p>
</section>

<footer>© 2026 mdtohaali</footer>

<script src="js/script.js"></script>
</body>
</html>
