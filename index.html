<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0d0f14;
    --text:#f5f5f7;
    --muted:#8b8d98;
    --accent:#6c63ff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
    scroll-behavior:smooth;
}

body{
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
}

/* ===== NAVBAR ===== */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:28px 8%;
}

.left{
    display:flex;
    align-items:center;
    gap:14px;
}

.left img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}

.left h1{
    font-size:16px;
    font-weight:600;
    letter-spacing:.5px;
}

nav a{
    text-decoration:none;
    color:var(--muted);
    margin-left:32px;
    font-size:14px;
    transition:.3s;
}

nav a:hover{
    color:var(--text);
}

/* ===== GRADIENT DIVIDER ===== */
.divider{
    height:1px;
    background:linear-gradient(to right, transparent, rgba(255,255,255,.15), transparent);
    margin:0 8%;
}

/* ===== HERO ===== */
.hero{
    padding:140px 8% 120px;
    max-width:900px;
}

.hero h2{
    font-size:54px;
    font-weight:700;
    line-height:1.1;
    margin-bottom:24px;
    letter-spacing:-1px;
}

.hero span{
    background:linear-gradient(90deg,var(--accent),#a78bfa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    font-size:17px;
    color:var(--muted);
    line-height:1.8;
    max-width:560px;
}

/* subtle fade in */
.hero{
    opacity:0;
    transform:translateY(40px);
    animation:fade 1s ease forwards .2s;
}

@keyframes fade{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ===== FOOTER ===== */
footer{
    padding:60px 8%;
    color:var(--muted);
    font-size:14px;
}

@media(max-width:768px){
    .hero h2{font-size:36px;}
    nav{display:none;}
}
</style>
</head>

<body>

<header>
    <div class="left">
        <img src="profile.jpg" alt="Profile">
        <h1>Your Name</h1>
    </div>

    <nav>
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="divider"></div>

<section class="hero">
    <h2>
        I design <span>minimal</span> and premium digital experiences.
    </h2>
    <p>
        Focused on clarity, performance and timeless design. 
        Building modern websites with refined aesthetics and strong visual hierarchy.
    </p>
</section>

<footer>
    © 2026 Your Name
</footer>

</body>
</html>
