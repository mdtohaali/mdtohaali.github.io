<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>mdtohaali</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header-area-wrapper" id="smartHeader">
    <header class="header">
        <div class="header-left">
            <div class="profile">
                <img src="assets/profile.jpg" alt="MTA" class="profile-image" id="profileBtn" data-type="private">
            </div>

            <div class="name-box">
                <div class="name" id="nameBtn" data-type="public">মোঃ তোহা আলী</div>
                <div class="bio">Be positive, be productive.</div>
            </div>
        </div>

        <div class="header-right" id="calendar-wrapper">
            <div class="header-cal-btn-premium">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            </div>
        </div>
    </header>
    
    <div id="search-box-container" class="f-search-wrapper">
        <input type="text" id="fSearch" class="f-search-input" 
               placeholder="শিরোনাম, লেখক বা বিষয় দিয়ে খুঁজুন..." 
               onkeyup="filterKnowledge()">
    </div> 
</div>

<main id="home-body" class="home-feed-container">
</main>

<div class="overlay" id="overlay"></div>

<div class="sidebar">
    <div class="closeBtn" id="closeSidebar">𝘅</div>
    <div class="sidebar-profile">
        <img src="assets/profile.jpg" alt="Profile" class="sidebar-img">
        <div class="sidebar-name">মোঃ তোহা আলী</div>
        <div class="sidebar-bio">Be positive, be productive.</div>
        <div id="publicSection" class="public-box"></div>
        <div id="privateSecurityWrapper"></div>
    </div>
</div>

<script src="script.js" type="module"></script>

</body>
</html>
